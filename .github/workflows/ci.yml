name: CI

# Gate every push to main and every pull request with a type-check + build.
# The existing deploy.yml only builds on push to main (no PR coverage); this
# workflow is the status check to point branch protection at, and the place
# lint / unit tests / e2e steps get added as they land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build   # tsc (strict, noEmit) && vite build

      # --- Growth slots (uncomment as each lands) ---
      # - name: Lint
      #   run: npm run lint
      - name: Unit tests
        run: npm run test -- --run
      # - name: End-to-end tests
      #   run: npm run e2e